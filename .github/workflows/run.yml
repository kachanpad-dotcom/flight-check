name: Run Python

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: 実行
        run: python main.py
        env:
        LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
