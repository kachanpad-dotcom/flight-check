name: jal-check

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install playwright

      - run: python -m playwright install --with-deps chromium

      - run: python jal_check.py
