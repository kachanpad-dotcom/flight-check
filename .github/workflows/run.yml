name: test-jal-playwright

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install playwright

      - name: Install Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run script
        env:
          JAL_TEST_URL: https://booking.jal.co.jp/jl/dom-bkg/upsell/outbound
        run: |
          python test_jal_playwright.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jal-playwright-artifacts
          path: artifacts/
